<!-- ====================
     萬界生存 V0.3
     HTML 結構
==================== -->

<div id="game">
  <!-- ====================
       UI 資源欄
  ==================== -->

  <div id="ui">
    <div>
      🪵 木材：
      <span id="wood">0</span>
    </div>

    <div>
      🪨 石頭：
      <span id="stone">0</span>
    </div>
  </div>

  <!-- ====================
       
  ==================== -->

  <div id="message"></div>
  <!-- ====================
       遊戲世界
  ==================== -->

  <div id="world">
    <!-- 玩家 -->
    <div id="player"></div>
  </div>
  <div id="inventory">
    <h3>🎒 背包</h3>

    <div class="resource-bar">
      <div class="resource-slot">
        🪵
        <span id="bagWood">0</span>
      </div>

      <div class="resource-slot">
        🪨
        <span id="bagStone">0</span>
      </div>
    </div>

    <button id="craftWorkbench" class="inventory-btn">🔨 工作台</button>

    <button id="craftAxe" class="inventory-btn">🪓 木斧</button>

    <button id="craftPickaxe" class="inventory-btn">⛏️ 木鎬</button>
  </div>
</div>
